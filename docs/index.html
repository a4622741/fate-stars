<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#080b12">
  <meta name="description" content="命運之星・108星辰錄 — 西方奇幻版水滸傳 2D RPG">
  <title>命運之星 — Fate Stars</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icon-192.svg">
  <link rel="apple-touch-icon" href="assets/icon-512.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== Main Game Canvas ===== -->
  <canvas id="game-canvas" width="480" height="320"></canvas>

  <!-- ===== HUD (top bar) ===== -->
  <div id="hud" class="overlay-ui" hidden>
    <div id="hud-left">
      <div class="hud-party">
        <div class="hud-member" id="hud-member-0">
          <div class="hud-portrait"></div>
          <div class="hud-bars">
            <span class="hud-name">—</span>
            <div class="hud-hp-bar"><div class="hud-hp-fill"></div></div>
            <div class="hud-mp-bar"><div class="hud-mp-fill"></div></div>
          </div>
        </div>
        <div class="hud-member" id="hud-member-1">
          <div class="hud-portrait"></div>
          <div class="hud-bars">
            <span class="hud-name">—</span>
            <div class="hud-hp-bar"><div class="hud-hp-fill"></div></div>
            <div class="hud-mp-bar"><div class="hud-mp-fill"></div></div>
          </div>
        </div>
        <div class="hud-member" id="hud-member-2">
          <div class="hud-portrait"></div>
          <div class="hud-bars">
            <span class="hud-name">—</span>
            <div class="hud-hp-bar"><div class="hud-hp-fill"></div></div>
            <div class="hud-mp-bar"><div class="hud-mp-fill"></div></div>
          </div>
        </div>
      </div>
    </div>
    <div id="hud-right">
      <span id="hud-location">未知之地</span>
      <span id="hud-gold"><i class="icon-gold">✦</i><span id="gold-amount">0</span></span>
    </div>
  </div>

  <!-- ===== Dialogue Box ===== -->
  <div id="dialogue-box" class="overlay-ui" hidden>
    <div id="dialogue-speaker"></div>
    <div id="dialogue-text"></div>
    <div id="dialogue-indicator">▼</div>
  </div>

  <!-- ===== Menu Overlay ===== -->
  <div id="menu-overlay" class="overlay-ui fullscreen-overlay" hidden>
    <div id="menu-container">
      <nav id="menu-tabs">
        <button class="menu-tab active" data-tab="party">同伴</button>
        <button class="menu-tab" data-tab="inventory">道具</button>
        <button class="menu-tab" data-tab="quests">任務</button>
        <button class="menu-tab" data-tab="map">地圖</button>
        <button class="menu-tab" data-tab="save">存檔</button>
        <button class="menu-tab" data-tab="settings">設定</button>
      </nav>
      <div id="menu-content">
        <section class="menu-panel active" data-panel="party">
          <div id="party-list"></div>
          <div id="party-detail"></div>
        </section>
        <section class="menu-panel" data-panel="inventory">
          <div id="inventory-categories"></div>
          <div id="inventory-list"></div>
          <div id="inventory-detail"></div>
        </section>
        <section class="menu-panel" data-panel="quests">
          <div id="quest-list"></div>
          <div id="quest-detail"></div>
        </section>
        <section class="menu-panel" data-panel="map">
          <canvas id="map-canvas" width="400" height="300"></canvas>
        </section>
        <section class="menu-panel" data-panel="save">
          <div id="save-slots"></div>
        </section>
        <section class="menu-panel" data-panel="settings">
          <div id="settings-form">
            <label>BGM 音量<input type="range" id="setting-bgm" min="0" max="100" value="70"></label>
            <label>SFX 音量<input type="range" id="setting-sfx" min="0" max="100" value="80"></label>
            <label>文字速度<input type="range" id="setting-text-speed" min="1" max="5" value="3"></label>
            <button id="setting-reset" class="btn-gold">重置設定</button>
          </div>
        </section>
      </div>
      <button id="menu-close" class="btn-icon" aria-label="關閉選單">✕</button>
    </div>
  </div>

  <!-- ===== Battle Overlay ===== -->
  <div id="battle-overlay" class="overlay-ui fullscreen-overlay" hidden>
    <div id="battle-scene">
      <div id="battle-enemies"></div>
      <div id="battle-effects"></div>
    </div>
    <div id="battle-ui">
      <div id="battle-party-status"></div>
      <div id="battle-actions">
        <button class="battle-btn" data-action="attack">攻擊</button>
        <button class="battle-btn" data-action="skill">技能</button>
        <button class="battle-btn" data-action="item">道具</button>
        <button class="battle-btn" data-action="defend">防禦</button>
        <button class="battle-btn" data-action="flee">逃跑</button>
      </div>
      <div id="battle-log"></div>
    </div>
  </div>

  <!-- ===== Shop Overlay ===== -->
  <div id="shop-overlay" class="overlay-ui fullscreen-overlay" hidden>
    <div id="shop-container">
      <div id="shop-header">
        <h2 id="shop-name">商店</h2>
        <span id="shop-gold"><i class="icon-gold">✦</i><span id="shop-gold-amount">0</span></span>
        <button id="shop-close" class="btn-icon" aria-label="離開商店">✕</button>
      </div>
      <nav id="shop-tabs">
        <button class="shop-tab active" data-shop="buy">購買</button>
        <button class="shop-tab" data-shop="sell">販賣</button>
      </nav>
      <div id="shop-items"></div>
      <div id="shop-item-detail"></div>
    </div>
  </div>

  <!-- ===== Title Screen ===== -->
  <div id="title-screen" class="overlay-ui fullscreen-overlay">
    <div id="title-content">
      <div id="title-logo">
        <div id="title-en">Fate Stars</div>
        <h1 id="title-zh">命運之星</h1>
        <div id="title-sub">108 星辰錄</div>
      </div>
      <div id="title-buttons">
        <button id="btn-new-game" class="btn-gold">新的旅程</button>
        <button id="btn-continue" class="btn-gold">繼續冒險</button>
      </div>
      <div id="title-footer">v0.1 &mdash; 觸碰任意處開始</div>
    </div>
  </div>

  <!-- ===== API Key Modal ===== -->
  <div id="api-key-modal" class="overlay-ui fullscreen-overlay" hidden>
    <div id="api-key-container">
      <h2>設定 API 金鑰</h2>
      <p>本遊戲使用 AI 生成動態劇情，請輸入您的 API 金鑰以啟動遊戲。</p>
      <label for="api-key-input">API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off">
      <div id="api-key-error" hidden></div>
      <button id="api-key-submit" class="btn-gold">確認</button>
      <button id="api-key-skip" class="btn-subtle">略過（離線模式）</button>
    </div>
  </div>

  <!-- ===== Mobile Touch Controls ===== -->
  <div id="touch-controls" class="overlay-ui" hidden>
    <div id="joystick-zone">
      <div id="joystick-base">
        <div id="joystick-thumb"></div>
      </div>
    </div>
    <button id="btn-action" class="touch-btn" aria-label="互動">Ａ</button>
    <button id="btn-cancel" class="touch-btn touch-btn-small" aria-label="取消">Ｂ</button>
  </div>

  <!-- ===== Menu Toggle (always visible during gameplay) ===== -->
  <button id="btn-menu" class="overlay-ui btn-icon" hidden aria-label="選單">☰</button>

  <!-- ===== Loading Spinner ===== -->
  <div id="loading" class="overlay-ui fullscreen-overlay">
    <div class="spinner"></div>
    <div id="loading-text">讀取中…</div>
  </div>

  <!-- ===== Scripts ===== -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
